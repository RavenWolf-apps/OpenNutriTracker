import java.io.FileInputStream
import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.opennutritracker.ont.opennutritracker"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    // ensures native .so libraries are packaged in the modern way needed
    // for page-aligned loading on newer devices.
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.opennutritracker.ont.opennutritracker"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    flavorDimensions "version"

    productFlavors {
        develop {
            dimension "version"
            applicationIdSuffix ".develop"
            versionNameSuffix "-develop"
        }
        full {
            dimension "version"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

    // Preserve the historic `app-<buildType>.apk` / `app-<buildType>.aab`
    // filenames for the `full` flavor so the public-facing artifacts stay
    // named `app-release.apk` and `app-release.aab`, matching the website's
    // "verify your download" instructions, the update-release-fingerprint
    // workflow, and the fastlane Android lane's default path. The develop
    // flavor keeps Gradle's default `app-develop-<buildType>.{apk,aab}` so
    // a sideloaded build is easy to spot in the output directory.
    applicationVariants.all { variant ->
        if (variant.flavorName == 'full') {
            // APK rename — AGP exposes this directly via Variant.outputs.
            variant.outputs.all { output ->
                output.outputFileName = "app-${variant.buildType.name}.apk"
            }
            // AAB rename — AGP doesn't expose a public DSL for the bundle
            // output filename, so we hook the variant's bundle task with a
            // doLast and move the file once it's been written. The bundle
            // lives at outputs/bundle/<variantName>/app-<flavor>-<buildType>.aab
            // by default; we rename it in place to app-<buildType>.aab.
            def variantName = variant.name
            def buildTypeName = variant.buildType.name
            def bundleTaskName = "bundle${variantName.capitalize()}"
            tasks.matching { it.name == bundleTaskName }.configureEach { task ->
                task.doLast {
                    def bundleDir = file("${buildDir}/outputs/bundle/${variantName}")
                    def sourceAab = new File(bundleDir, "app-${variant.flavorName}-${buildTypeName}.aab")
                    def destAab = new File(bundleDir, "app-${buildTypeName}.aab")
                    if (sourceAab.exists()) {
                        if (destAab.exists()) destAab.delete()
                        sourceAab.renameTo(destAab)
                    }
                }
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

name: Setup Flutter
description: Installs Flutter via subosito/flutter-action and uses its built-in SDK cache.
inputs:
  flutter-version:
    description: Flutter SDK version.
    required: false
    default: '3.41.7'
  channel:
    description: Flutter channel.
    required: false
    default: stable
runs:
  using: composite
  steps:
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ inputs.flutter-version }}
        channel: ${{ inputs.channel }}
        cache: true
